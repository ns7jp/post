name: PHP check

on:
  push:
  pull_request:

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo_mysql, mbstring

      - name: Lint PHP files
        run: find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l
